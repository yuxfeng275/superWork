# 开发环境配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bu_management?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: bu_admin
    password: bu_admin123

  data:
    redis:
      host: localhost
      port: 6379

  flyway:
    enabled: true
    clean-disabled: false  # 开发环境允许清理数据库
    out-of-order: true  # 允许乱序执行迁移

# MyBatis Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开发环境打印 SQL

# MinIO 配置
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin123

# 日志配置
logging:
  level:
    root: INFO
    com.bu.management: DEBUG
    org.springframework.security: DEBUG
    com.baomidou.mybatisplus: DEBUG

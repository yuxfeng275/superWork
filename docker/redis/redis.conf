# Redis 配置文件

# 绑定地址
bind 0.0.0.0

# 保护模式关闭（Docker 内部网络）
protected-mode no

# 端口
port 6379

# 持久化配置
save 900 1
save 300 10
save 60 10000

# RDB 文件名
dbfilename dump.rdb

# 工作目录
dir /data

# AOF 持久化
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# 最大内存
maxmemory 512mb
maxmemory-policy allkeys-lru

# 日志级别
loglevel notice

# 超时时间
timeout 300

version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: bu-management-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: bu_management
      MYSQL_USER: bu_admin
      MYSQL_PASSWORD: bu_admin123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/conf:/etc/mysql/conf.d
      - ./mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - bu-network

  redis:
    image: redis:7-alpine
    container_name: bu-management-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - bu-network

  minio:
    image: minio/minio:latest
    container_name: bu-management-minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio/data:/data
    command: server /data --console-address ":9001"
    networks:
      - bu-network

  nginx:
    image: nginx:alpine
    container_name: bu-management-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/html:/usr/share/nginx/html
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - bu-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: bu-management-backend
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: bu_management
      MYSQL_USER: bu_admin
      MYSQL_PASSWORD: bu_admin123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
    ports:
      - "8081:8081"
    depends_on:
      - mysql
      - redis
      - minio
    networks:
      - bu-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: bu-management-frontend
    restart: always
    ports:
      - "8080:80"
    networks:
      - bu-network

networks:
  bu-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  minio-data:
